<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação - Viação Jacareí</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="topo">
            <h1>VIAÇÃO JACAREÍ</h1>
            <p>Ficha de Identificação de Operação</p>
        </div>

        <form class="formulario">

            <div class="grupo">
                <label>Número da Chapa</label>
                <input type="text" placeholder="Ex: 1523">
            </div>

            <div class="grupo">
                <label>Veículo</label>
                <input type="text" placeholder="Ex: Ônibus Escolar">
            </div>

            <div class="grupo">
                <label>Chassi</label>
                <input type="text" placeholder="Ex: 9BWZZZ377VT004251">
            </div>

            <div class="grupo">
                <label>Rota</label>
                <input type="text" placeholder="Ex: Rota 12 - Centro">
            </div>

            <div class="grupo">
                <label>Alunos (Quantidade)</label>
                <input type="number" placeholder="Ex: 34">
            </div>

            <div class="grupo">
                <label>KM Inicial</label>
                <input type="number" placeholder="Ex: 102350">
            </div>

            <div class="grupo">
                <label>KM Parada 1</label>
                <input type="number" placeholder="Ex: 102365">
            </div>

            <div class="grupo">
                <label>KM Parada 2</label>
                <input type="number" placeholder="Ex: 102389">
            </div>

            <div class="grupo">
                <label>KM Final</label>
                <input type="number" placeholder="Ex: 102420">
            </div>

            <button type="submit" class="btn">
                Salvar Informações
            </button>

        </form>

    </div>

</body>
</html>
